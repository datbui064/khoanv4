<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Khoa An ninh Chính trị Nội bộ - Học viện ANND</title>
    <base href="/" />

   
    <link rel="stylesheet" href="/css/bootstrap/bootstrap.min.css" />

    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    
    <link rel="icon" type="image/png" href="favicon.png" />

   
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <div class="d-flex flex-column justify-content-center align-items-center vh-100 bg-light">
            <div class="spinner-border text-danger" role="status" style="width: 3rem; height: 3rem;"></div>
            <h5 class="mt-3 text-secondary fw-bold text-uppercase">Đang tải ...</h5>
        </div>
    </div>

    <div id="blazor-error-ui" style="display: none;" class="bg-warning text-dark p-2 text-center fixed-bottom">
        Đã có lỗi hệ thống xảy ra.
        <a href="" class="reload fw-bold text-danger mx-2">Tải lại trang</a>
        <a class="dismiss text-dark" style="cursor: pointer;">🗙</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>

    <script src="https://cdn.tiny.cloud/1/at9ypmn6yrrhnvzbpbc40fm7o68k7mvfqs2ky7iv76epc48k/tinymce/7/tinymce.min.js" referrerpolicy="origin"></script>

    <script>
        window.initTinyMCE = (dotNetHelper, content) => {
            // Xóa sạch dấu vết cũ
            if (tinymce.get('tiny-editor')) { tinymce.get('tiny-editor').remove(); }

            tinymce.init({
                selector: '#tiny-editor',
                height: 500,
                license_key: 'gpl', // Khai báo bản quyền mở cho TinyMCE 7
                promotion: false,
                branding: false,
                setup: function (editor) {
                    editor.on('init', function () {
                        editor.setContent(content || "");
                        editor.mode.set("design");
                        console.log("✅ Editor đã thông chốt!");
                    });
                    editor.on('change', function () {
                        dotNetHelper.invokeMethodAsync('UpdateContentFromJS', editor.getContent());
                    });
                },
                plugins: 'image link media table lists wordcount',
                toolbar: 'undo redo | blocks | bold italic | alignleft aligncenter alignright alignjustify | bullist numlist | image media table link',
                images_upload_handler: (blobInfo, progress) => new Promise(async (resolve, reject) => {
                    const formData = new FormData();
                    formData.append('file', blobInfo.blob(), blobInfo.filename());

                    let token = localStorage.getItem('authToken') || sessionStorage.getItem('authToken');
                    if (token) token = token.replace(/^"(.*)"$/, '$1');

                    try {
                        const response = await fetch('https://khoanv4-api.onrender.com/api/Photos', {
                            method: 'POST',
                            body: formData,
                            headers: {
                                'Authorization': `Bearer ${token}`
                            }
                        });

                        if (!response.ok) {
                            const errorData = await response.json();
                            reject(`Lỗi ${response.status}: ${errorData.message || 'Không thể upload'}`);
                            return;
                        }

                        const result = await response.json();

                        // TinyMCE 7 cần resolve một string là URL của ảnh
                        if (result && result.location) {
                            resolve(result.location);
                        } else {
                            reject("Phản hồi từ Server thiếu trường 'location'");
                        }
                    } catch (e) {
                        reject('Lỗi kết nối mạng hoặc Server: ' + e.message);
                    }
                })
            });
        };

        // Hàm đổ dữ liệu Word có giới hạn số lần thử để tránh treo máy
        let retryCount = 0;
        window.setTinyMCEContent = (content) => {
            let editor = tinymce.get('tiny-editor');
            if (editor && editor.initialized) {
                editor.setContent(content);
                retryCount = 0;
                console.log("🚀 Đã đổ dữ liệu Word thành công!");
            } else {
                if (retryCount < 20) { // Thử tối đa 20 lần (4 giây)
                    retryCount++;
                    setTimeout(() => window.setTinyMCEContent(content), 200);
                } else {
                    console.error("❌ Editor quá lâu không sẵn sàng, đã dừng thử.");
                    retryCount = 0;
                }
            }
        };
    </script>
    <script>
        window.downloadFileFromStream = async (fileName, contentStreamReference) => {
            const arrayBuffer = await contentStreamReference.arrayBuffer();
            const blob = new Blob([arrayBuffer]);
            const url = URL.createObjectURL(blob);
            const anchorElement = document.createElement('a');
            anchorElement.href = url;
            anchorElement.download = fileName ?? '';
            anchorElement.click();
            anchorElement.remove();
            URL.revokeObjectURL(url);
        }
    </script>
    <script>
        window.copyToClipboard = async (text) => {
            try {
                await navigator.clipboard.writeText(text);
                return true;
            } catch (error) {
                console.error("Lỗi copy: ", error);
                return false;
            }
        }
    </script>
</body>
</html>
