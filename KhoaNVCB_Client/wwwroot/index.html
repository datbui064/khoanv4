<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Khoa An ninh Chính trị Nội bộ - Học viện ANND</title>
    <base href="/" />


    <link rel="stylesheet" href="/css/bootstrap/bootstrap.min.css" />


    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />


    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-eval' 'unsafe-inline' https://cdn.tiny.cloud https://www.google.com;">
</head>

<body>
    <div id="app">
        <style>
            .loading-container {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                height: 100vh;
                background: radial-gradient(circle, #112240 0%, #0a192f 100%);
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                color: white;
            }

            .logo-loader {
                position: relative;
                width: 120px;
                height: 120px;
                margin-bottom: 30px;
            }

            /* Vòng tròn xoay bên ngoài */
            .loader-ring {
                position: absolute;
                width: 100%;
                height: 100%;
                border: 3px solid transparent;
                border-top: 3px solid #c5a059;
                border-radius: 50%;
                animation: spin 1.5s linear infinite;
            }

                .loader-ring:before {
                    content: "";
                    position: absolute;
                    top: 10px;
                    left: 10px;
                    right: 10px;
                    bottom: 10px;
                    border: 2px solid transparent;
                    border-top: 2px solid rgba(197, 160, 89, 0.5);
                    border-radius: 50%;
                    animation: spin 3s linear infinite;
                }

            .logo-img {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 70px;
                filter: drop-shadow(0 0 10px rgba(197, 160, 89, 0.5));
            }

            /* Hiệu ứng chữ loading sang trọng */
            .loading-text {
                text-transform: uppercase;
                letter-spacing: 4px;
                font-size: 0.9rem;
                font-weight: 700;
                color: #c5a059;
                background: linear-gradient(90deg, #0a192f, #fff, #0a192f);
                background-repeat: no-repeat;
                background-size: 80%;
                animation: shimmer 2.5s linear infinite;
                -webkit-background-clip: text;
                -webkit-text-fill-color: rgba(197, 160, 89, 0.3);
            }

            .sub-text {
                margin-top: 10px;
                color: #8892b0;
                font-size: 0.75rem;
                font-style: italic;
            }

            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }

                100% {
                    transform: rotate(360deg);
                }
            }

            @keyframes shimmer {
                0% {
                    background-position: -500%;
                }

                100% {
                    background-position: 500%;
                }
            }
        </style>

        <div class="loading-container">
            <div class="logo-loader">
                <div class="loader-ring"></div>
                <img src="/Images/Logo_hoc_vien_ANND.png" class="logo-img" alt="Logo">
            </div>
            <div class="loading-text">Khoa An ninh Chính Trị nội bộ</div>
            <div class="sub-text">Hệ thống đang khởi tạo tri thức...</div>
        </div>
    </div>

    <div id="blazor-error-ui" style="display: none;" class="bg-warning text-dark p-2 text-center fixed-bottom">
        Đã có lỗi hệ thống xảy ra.
        <a href="" class="reload fw-bold text-danger mx-2">Tải lại trang</a>
        <a class="dismiss text-dark" style="cursor: pointer;">🗙</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>

    <script src="https://cdn.tiny.cloud/1/vct0kgaao8y3mqybgnrqup6bs1fqcvb75ez99u3klrycdd5z/tinymce/7/tinymce.min.js" referrerpolicy="origin"></script>

    <script>
        // Đảm bảo hàm này nằm ngoài cùng, không bọc trong hàm nào khác
        window.initTinyMCE = (dotNetRef, initialContent) => {
            tinymce.init({
                selector: '#tiny-editor',
                height: 500,
                plugins: 'anchor autolink charmap codesample emoticons image link lists media searchreplace table visualblocks wordcount',
                toolbar: 'undo redo | blocks fontfamily fontsize | bold italic underline strikethrough | link image media table | align lineheight | numlist bulletlist indent outdent | emoticons charmap | removeformat',

                // Fix lỗi 'setup' bằng cách viết đúng cú pháp:
                setup: (editor) => {
                    editor.on('init', () => {
                        editor.setContent(initialContent);
                    });
                    editor.on('change', () => {
                        dotNetRef.invokeMethodAsync('UpdateContentFromJS', editor.getContent());
                    });
                },

                // Cấu hình Upload ảnh chuẩn
                images_upload_handler: (blobInfo) => new Promise(async (resolve, reject) => {
                    try {
                        const formData = new FormData();
                        formData.append('file', blobInfo.blob(), blobInfo.filename());

                        let token = localStorage.getItem('authToken') || sessionStorage.getItem('authToken');
                        if (token) token = token.replace(/^"(.*)"$/, '$1');

                        const response = await fetch('https://khoanv4-api.onrender.com/api/Photos', {
                            method: 'POST',
                            body: formData,
                            headers: {
                                'Authorization': `Bearer ${token}`
                            }
                        });

                        if (!response.ok) {
                            const errorData = await response.json();
                            reject(errorData.message || 'Upload thất bại');
                            return;
                        }

                        const result = await response.json();
                        resolve(result.location);
                    } catch (error) {
                        reject('Lỗi kết nối server');
                    }
                })
            });
        };

        // Hàm bổ trợ để set nội dung (dùng khi bóc tách Word)
        window.setTinyMCEContent = (content) => {
            if (tinymce.get('tiny-editor')) {
                tinymce.get('tiny-editor').setContent(content);
            }
        };
        // Hàm đổ dữ liệu Word có giới hạn số lần thử để tránh treo máy
        let retryCount = 0;
        window.setTinyMCEContent = (content) => {
            let editor = tinymce.get('tiny-editor');
            if (editor && editor.initialized) {
                editor.setContent(content);
                retryCount = 0;
                console.log("🚀 Đã đổ dữ liệu Word thành công!");
            } else {
                if (retryCount < 20) { // Thử tối đa 20 lần (4 giây)
                    retryCount++;
                    setTimeout(() => window.setTinyMCEContent(content), 200);
                } else {
                    console.error("❌ Editor quá lâu không sẵn sàng, đã dừng thử.");
                    retryCount = 0;
                }
            }
        };
        window.getTinyMCEContent = (id) => {
            const editor = tinymce.get(id);
            if (editor) {
                return editor.getContent();
            }
            console.error("❌ Không tìm thấy editor với ID:", id);
            return "";
        };
    </script>
    <script>
        window.downloadFileFromStream = async (fileName, contentStreamReference) => {
            const arrayBuffer = await contentStreamReference.arrayBuffer();
            const blob = new Blob([arrayBuffer]);
            const url = URL.createObjectURL(blob);
            const anchorElement = document.createElement('a');
            anchorElement.href = url;
            anchorElement.download = fileName ?? '';
            anchorElement.click();
            anchorElement.remove();
            URL.revokeObjectURL(url);
        }
    </script>
    <script>
        window.copyToClipboard = async (text) => {
            try {
                await navigator.clipboard.writeText(text);
                return true;
            } catch (error) {
                console.error("Lỗi copy: ", error);
                return false;
            }
        }
    </script>
</body>
</html>
